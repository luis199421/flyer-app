name: Compilar APK de Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK con Buildozer
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /opt/hostedtoolcache/CodeQL /usr/local/lib/android/sdk/ndk || true
          df -h /

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libtinfo6 cmake libffi-dev libssl-dev \
            libltdl-dev gettext

      - name: Instalar Buildozer y Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0" buildozer

      - name: Cachear el SDK/NDK de Android (solo descargas)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Compilar el APK (modo debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build_full.log

      - name: Guardar el log completo (siempre, aunque falle)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_full.log
          if-no-files-found: warn

      - name: Subir el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: flyer-apk
          path: bin/*.apk
          if-no-files-found: error
