name: Compilar APK de Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK con Buildozer
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /opt/hostedtoolcache/CodeQL /usr/local/lib/android/sdk/ndk || true
          df -h /

      - name: Generar el codigo correcto y corregir la config (a prueba de fallos)
