          B64EOF
          # (c) Corregir buildozer.spec pase lo que pase:
          #     - quitar android.add_src (rompe Gradle)
          #     - forzar una sola arquitectura arm64-v8a
          sed -i '/^[[:space:]]*android\.add_src[[:space:]]*=/d' buildozer.spec
          if grep -q '^[[:space:]]*android\.archs' buildozer.spec; then
            sed -i 's/^[[:space:]]*android\.archs.*/android.archs = arm64-v8a/' buildozer.spec
          else
            printf '\nandroid.archs = arm64-v8a\n' >> buildozer.spec
          fi
          echo "--- Verificacion ---"
          python3 -c "import py_compile; py_compile.compile('main.py', doraise=True); print('main.py OK')"
          echo "archs y add_src efectivos:"
          grep -E 'android.archs|android.add_src' buildozer.spec || echo "add_src eliminado, archs=arm64-v8a"

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libtinfo6 cmake libffi-dev libssl-dev \
            libltdl-dev gettext

      - name: Instalar Buildozer y Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0" buildozer

      - name: Cachear el SDK/NDK de Android
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Compilar el APK (modo debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build_full.log

      - name: Mostrar el error si la compilacion fallo
        if: failure()
        run: |
          echo "==================== ULTIMAS 80 LINEAS ===================="
          tail -n 80 build_full.log || true
          echo ""
          echo "==================== LINEAS CON error/failed ===================="
          grep -i -n -E "error|failed|exception|traceback|command failed|aborting" build_full.log | tail -n 50 || true

      - name: Guardar el log completo (siempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_full.log
          if-no-files-found: warn

      - name: Subir el APK
        uses: actions/upload-artifact@v4
        with:
          name: flyer-apk
          path: bin/*.apk
          if-no-files-found: error
